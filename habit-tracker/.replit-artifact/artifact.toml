kind = "mobile"
previewPath = "/"
title = "Habit Tracker"
version = "1.0.0"
id = "artifacts/habit-tracker"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22128

[services.development]
run = "pnpm --filter @workspace/habit-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/habit-tracker", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/habit-tracker", "run", "serve" ]

[services.env]
PORT = "22128"
BASE_PATH = "/"
